{% extends "layouts/main.html" %}

{% block pageTitle %}
  What is the name of your policy, programme or project? – {{serviceName}} – GOV.UK Prototype Kit
{% endblock %}

{% block content %}
<div class="govuk-grid-row">
    
  <div class="govuk-grid-column-two-thirds">

    <form action="change-driver" method="post" novalidate>

      <div class="govuk-form-group">
        <h1 class="govuk-label-wrapper">
          <label class="govuk-label govuk-label--l" for="programme-name">What is the name of your policy, programme or project?</label>
        </h1>
        <input class="govuk-input" id="programme-name" name="programmeName" type="text">
      </div>

      <div class="govuk-form-block">
        <button type="submit" class="govuk-button" data-module="govuk-button">Continue</button>
      </div>

    </form>

  </div>

</div>
{% endblock %}
